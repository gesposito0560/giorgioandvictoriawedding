<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Victoria & Giorgio's Wedding Gallery</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href='https://fonts.googleapis.com/css?family=Prata' rel='stylesheet'>
 
  <style>
    :root {
      --sage: #8da089;
      --charcoal: #2c2c2c;
      --paper: #ffffff;
      --cream: #fcfbf9;
      --border: #e0ddd5;
    }
 
    body, html {
      margin: 0; padding: 0; height: 100%;
      background-color: var(--cream);
      font-family: 'Prata', serif;
      color: var(--charcoal);
      overflow: hidden;
    }
 
    /* --- 3D INVITATION STAGE --- */
    #invitation-stage {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      display: flex; justify-content: center; align-items: center;
      z-index: 2000;
      perspective: 1800px;
      background: var(--cream);
      transition: opacity 1s ease;
    }
 
    .card-wrapper {
      position: relative;
      width: 480px; 
      height: 680px;
      transform-style: preserve-3d;
      transition: transform 1.6s cubic-bezier(0.45, 0.05, 0.55, 0.95);
      cursor: pointer;
    }
 
    .card-face {
      position: absolute;
      width: 100%; height: 100%;
      backface-visibility: hidden;
      background: var(--paper);
      box-shadow: 0 15px 50px rgba(0,0,0,0.05);
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      padding: 50px; box-sizing: border-box;
      transform-style: preserve-3d;
    }
 
    .card-front { z-index: 2; }
    .card-back { transform: rotateY(180deg); z-index: 1; }
 
    .vellum-wing {
      position: absolute;
      top: 0; width: 50.2%; height: 100%;
      background: rgba(255, 255, 255, 0.65);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      transition: transform 1.4s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 10;
      border: 0.5px solid rgba(0,0,0,0.02);
    }
    .card-front .vellum-wing { background: rgba(255, 255, 255, 0.45); }
 
    .wing-left { left: 0; transform-origin: left center; }
    .wing-right { right: 0; transform-origin: right center; }
 
    .inner-frame {
      position: absolute;
      top: 20px; left: 20px; right: 20px; bottom: 20px;
      border: 1px solid var(--charcoal);
      pointer-events: none;
    }
    .names { font-size: 32px; text-transform: uppercase; letter-spacing: 2px; text-align: center; }
    .ampersand { font-size: 28px; color: var(--sage); margin: 15px 0; }
 
    .state-flip { transform: rotateY(180deg); }
    .state-open .vellum-wing.wing-left { transform: rotateY(-140deg); }
    .state-open .vellum-wing.wing-right { transform: rotateY(140deg); }
    .state-zoom { transform: rotateY(0deg) scale(3.5); opacity: 0; pointer-events: none; }
 
    /* --- LOADING PERCENTAGE (ON CARD BACK) --- */
    .loading-memories {
      position: absolute;
      bottom: 40px;
      width: 100%;
      text-align: center;
      color: var(--sage);
      font-size: 11px;
      letter-spacing: 2px;
      opacity: 0.8;
      pointer-events: none;
      z-index: 100;
      transition: opacity 0.3s;
    }
 
    .percentage-number {
      font-size: 14px;
      font-weight: normal;
      color: var(--charcoal);
      letter-spacing: 1px;
      margin-top: 5px;
    }
 
    /* --- UPLOAD PROGRESS BAR --- */
    .upload-progress {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(252, 251, 249, 0.95);
      z-index: 4000;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }
 
    .upload-progress-content {
      text-align: center;
      padding: 40px;
      background: white;
      border-radius: 10px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.1);
      max-width: 400px;
      width: 80%;
    }
 
    .upload-percentage {
      font-size: 42px;
      color: var(--charcoal);
      margin: 20px 0;
      font-weight: normal;
    }
 
    .upload-status {
      color: var(--sage);
      letter-spacing: 2px;
      font-size: 0.9rem;
      margin-top: 20px;
    }
 
    /* --- GALLERY CONTENT --- */
    #main-site {
      opacity: 0; display: none;
      padding: 80px 20px; max-width: 1200px; margin: 0 auto;
    }
    .is-visible { opacity: 1 !important; display: block !important; overflow: auto; }
 
    h2 { font-weight: 400; letter-spacing: 4px; text-transform: uppercase; color: var(--sage); text-align: center; margin-bottom: 40px; }
 
    .upload-container {
      margin-bottom: 80px; padding: 40px; border-bottom: 1px solid var(--border); text-align: center;
    }
 
    .custom-file-upload {
      display: inline-block; padding: 15px 40px; cursor: pointer; border: 1px solid var(--charcoal); text-transform: uppercase; letter-spacing: 2px; font-size: 0.8rem; transition: all 0.3s;
    }
    .custom-file-upload:hover { background: var(--charcoal); color: white; }
 
    #uploadBtn {
      display: block; margin: 20px auto; background: var(--sage); color: white; border: none; padding: 12px 50px; border-radius: 40px; cursor: pointer; font-family: 'Prata'; font-size: 1rem;
    }
 
    .gallery-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px;
    }
 
    .gallery-item {
      background: white; padding: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); cursor: pointer; transition: transform 0.3s;
      position: relative;
    }
    .gallery-item:hover { transform: translateY(-5px); }
 
    .gallery-grid img, .gallery-grid video {
      width: 100%; height: 350px; object-fit: cover; display: block;
      background: #f5f5f5;
    }
 
    .video-indicator {
      position: absolute;
      top: 15px;
      right: 15px;
      background: rgba(0, 0, 0, 0.7);
      color: white;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 0.7rem;
      z-index: 10;
    }
 
    /* --- LIGHTBOX & DOWNLOAD --- */
    #lightbox {
      display:none; position:fixed; top:0; left:0; width:100%; height:100%; 
      background: rgba(252, 251, 249, 0.98); justify-content:center; align-items:center; z-index:3000;
      touch-action: pan-y;
    }
 
    #lightbox-content { 
      max-width:90%; max-height:80%; 
      box-shadow: 0 20px 60px rgba(0,0,0,0.1); 
      transition: opacity 0.3s;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
    }
 
    .arrow {
      position: absolute; top: 50%; transform: translateY(-50%);
      font-size: 40px; color: var(--sage); cursor: pointer; padding: 20px; z-index: 3100;
      background: rgba(255,255,255,0.7); border-radius: 50%; width: 60px; height: 60px;
      display: flex; align-items: center; justify-content: center;
    }
    .arrow-left { left: 20px; }
    .arrow-right { right: 20px; }
 
    .lb-nav { 
      position: absolute; bottom: 30px; width: 100%; 
      text-align: center; letter-spacing: 2px; color: var(--sage); 
      font-size: 0.9rem; 
      pointer-events: none;
    }
 
    #downloadBtn {
      position: absolute; top: 20px; left: 20px;
      padding: 10px 20px; border: 1px solid var(--sage); color: var(--sage);
      background: transparent; cursor: pointer; text-transform: uppercase;
      font-size: 0.7rem; letter-spacing: 1px; transition: all 0.3s;
      z-index: 3200;
    }
    #downloadBtn:hover { background: var(--sage); color: white; }
 
    #downloadAllBtn {
      position: absolute; top: 20px; left: 150px;
      padding: 10px 20px; border: 1px solid var(--sage); color: var(--sage);
      background: transparent; cursor: pointer; text-transform: uppercase;
      font-size: 0.7rem; letter-spacing: 1px; transition: all 0.3s;
      z-index: 3200;
      display: none;
    }
    #downloadAllBtn:hover { background: var(--sage); color: white; }
 
    .mobile-nav-dots {
      display: none;
      position: absolute;
      bottom: 80px;
      width: 100%;
      text-align: center;
      z-index: 3100;
    }
 
    .dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      margin: 0 5px;
      background-color: var(--sage);
      border-radius: 50%;
      opacity: 0.5;
      transition: opacity 0.3s;
    }
 
    .dot.active {
      opacity: 1;
      transform: scale(1.2);
    }
 
    .collection-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 40px;
      flex-wrap: wrap;
      gap: 20px;
    }
 
    .download-all-collection {
      padding: 12px 25px;
      border: 1px solid var(--sage);
      color: var(--sage);
      background: transparent;
      cursor: pointer;
      text-transform: uppercase;
      font-family: 'Prata';
      font-size: 0.8rem;
      letter-spacing: 2px;
      transition: all 0.3s;
      white-space: nowrap;
    }
    .download-all-collection:hover {
      background: var(--sage);
      color: white;
    }
 
    @media (max-width: 600px) {
      .card-wrapper { width: 85vw; height: 119vw; }
      .names { font-size: 1.5rem; }
      .arrow { 
        display: none; 
        background: rgba(255,255,255,0.9); 
        width: 50px; height: 50px; 
        font-size: 30px;
      }
      .mobile-nav-dots { display: block; }
      #lightbox-content { max-width: 95%; max-height: 85%; }
      #downloadBtn { top: 10px; left: 10px; padding: 8px 15px; font-size: 0.6rem; }
      #downloadAllBtn { top: 10px; left: 120px; padding: 8px 15px; font-size: 0.6rem; }
      .collection-header {
        flex-direction: column;
        text-align: center;
        gap: 15px;
      }
      .download-all-collection {
        padding: 10px 20px;
        font-size: 0.7rem;
      }
      .loading-memories {
        bottom: 60px;
        font-size: 10px;
      }
    }
</style>
</head>
<body>
 
  <div id="invitation-stage">
<div class="card-wrapper" id="card" onclick="runOpeningSequence()">
<div class="card-face card-front">
<div class="vellum-wing wing-left"></div>
<div class="vellum-wing wing-right"></div>
<div class="inner-frame"></div>
<p style="font-size: 9px; letter-spacing: 3px; opacity: 0.6;">REQUEST THE HONOR OF YOUR COMPANY</p>
<div class="names">Victoria Purdy</div>
<div class="ampersand">&</div>
<div class="names">Giorgio Esposito</div>
<p style="font-size: 13px; margin-top: 30px; letter-spacing: 2px;">03 . 28 . 2026</p>
</div>
<div class="card-face card-back">
<div class="vellum-wing wing-left"></div>
<div class="vellum-wing wing-right"></div>
<!-- MOVED: Loading memories text on card back -->
<div class="loading-memories" id="loadingMemories">
<div>LOADING MEMORIES</div>
<div class="percentage-number" id="percentageNumber">0%</div>
</div>
<p style="font-size: 11px; letter-spacing: 4px; color: var(--sage); margin-bottom: 60px;">TAP TO UNVEIL</p>
</div>
</div>
</div>
 
  <!-- Upload Progress Modal -->
<div class="upload-progress" id="uploadProgress">
<div class="upload-progress-content">
<h2>Uploading Memories</h2>
<div class="upload-percentage" id="uploadPercentage">0%</div>
<div class="upload-status" id="uploadStatus">Starting upload...</div>
</div>
</div>
 
  <div id="main-site">
<div class="upload-container">
<h2>Share Your Memories</h2>
<label for="fileInput" class="custom-file-upload">Select Photos / Videos</label>
<input type="file" id="fileInput" accept="image/*,video/*" multiple style="display:none;">
<div id="file-count" style="font-size: 0.8rem; margin: 15px 0; color: var(--sage);"></div>
<button id="uploadBtn">Upload to Gallery</button>
<div id="status" style="font-size: 0.8rem; margin-top: 15px;"></div>
</div>
 
    <div class="collection-header">
<h2>The Collection</h2>
<button class="download-all-collection" id="downloadAllCollectionBtn" onclick="downloadAllMedia()">Download All Memories</button>
</div>
<div id="gallery" class="gallery-grid"></div>
</div>
 
  <div id="lightbox">
<button id="downloadBtn" onclick="downloadCurrentMedia()">Download Original</button>
<button id="downloadAllBtn" onclick="downloadAllMedia()">Download All</button>
<div class="arrow arrow-left" onclick="prevImage()">❮</div>
<div id="media-container" style="display:contents;"></div>
<div class="arrow arrow-right" onclick="nextImage()">❯</div>
<div class="lb-nav" id="lb-counter"></div>
<div class="mobile-nav-dots" id="navDots"></div>
<div style="position:absolute; top:20px; right:20px; cursor:pointer; font-size:24px; z-index:3200;" onclick="closeLightbox()">✕</div>
</div>
 
  <script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyt-UGrZwkoTJwlbUOYGnDAEUbycu16TYH_usG_a1npV_9xRF6AZJTPGf5kVLwj2jIfNg/exec%27;
    let allImages = [];
    let currentIndex = 0;
    let dataLoaded = false;
    let touchStartX = 0;
    let touchEndX = 0;
    let preloadedThumbnails = 0;
 
    // FIXED: Use direct Google Drive URLs that work on mobile
    function getThumbnailUrl(fileId, width = 400) {
      // Direct Google Drive thumbnail URL
      return `https://drive.google.com/thumbnail?id=${fileId}&sz=w${width}`;
    }
 
    // FIXED: Direct view URL for images
    function getViewUrl(fileId) {
      return `https://drive.google.com/uc?id=${fileId}`;
    }
 
    // FIXED: Direct download URL
    function getDownloadUrl(fileId) {
      return `https://drive.google.com/uc?id=${fileId}&export=download`;
    }
 
    // FIXED: Update loading percentage on card back
    function updateLoadingPercentage(percent) {
      const percentageElement = document.getElementById('percentageNumber');
      if (percentageElement) {
        percentageElement.textContent = `${Math.min(Math.round(percent), 100)}%`;
      }
    }
 
    // FIXED: Show upload progress modal
    function showUploadProgress() {
      const uploadProgress = document.getElementById('uploadProgress');
      uploadProgress.style.display = 'flex';
      updateUploadPercentage(0);
      document.getElementById('uploadStatus').textContent = 'Starting upload...';
    }
 
    function hideUploadProgress() {
      const uploadProgress = document.getElementById('uploadProgress');
      uploadProgress.style.display = 'none';
    }
 
    function updateUploadPercentage(percent) {
      const uploadPercentage = document.getElementById('uploadPercentage');
      if (uploadPercentage) {
        uploadPercentage.textContent = `${Math.round(percent)}%`;
      }
    }
 
    function updateUploadStatus(status) {
      const uploadStatus = document.getElementById('uploadStatus');
      if (uploadStatus) {
        uploadStatus.textContent = status;
      }
    }
 
    // Track thumbnail preloading progress
    function trackThumbnailLoad() {
      preloadedThumbnails++;
      const totalToPreload = Math.min(6, allImages.length);
      const percent = (preloadedThumbnails / totalToPreload) * 100;
      updateLoadingPercentage(percent);
      if (preloadedThumbnails >= totalToPreload && dataLoaded) {
        // Keep showing 100% until animation starts
        setTimeout(() => {
          const loadingMemories = document.getElementById('loadingMemories');
          if (loadingMemories) {
            loadingMemories.style.opacity = '0';
          }
        }, 500);
      }
    }
 
    // --- START LOADING GALLERY DATA IMMEDIATELY ---
    (function preloadGalleryData() {
      updateLoadingPercentage(10);
      fetch(SCRIPT_URL)
        .then(res => res.json())
        .then(data => {
          updateLoadingPercentage(50);
          if (data.success) {
            allImages = data.images || [];
            dataLoaded = true;
            updateLoadingPercentage(70);
            preloadedThumbnails = 0;
            preloadFirstFewThumbnails();
            if (allImages.length === 0) {
              updateLoadingPercentage(100);
            }
          } else {
            updateLoadingPercentage(100);
          }
        })
        .catch(err => {
          console.log('Background preload attempt:', err.message);
          updateLoadingPercentage(100);
        });
    })();
 
    function preloadFirstFewThumbnails() {
      const maxPreload = Math.min(6, allImages.length);
      if (maxPreload === 0) {
        updateLoadingPercentage(100);
        return;
      }
      for (let i = 0; i < maxPreload; i++) {
        const img = new Image();
        img.onload = trackThumbnailLoad;
        img.onerror = trackThumbnailLoad;
        const item = allImages[i];
        const isVideo = item.mimeType?.includes('video') || 
                       item.name?.toLowerCase().match(/\.(mp4|mov|webm|avi|wmv|flv|mkv)$/);
        if (isVideo) {
          // For videos, we'll use a generic video icon
          setTimeout(trackThumbnailLoad, 100);
        } else {
          // FIXED: Add timestamp to prevent caching issues
          img.src = getThumbnailUrl(item.id, 400) + '&t=' + Date.now();
        }
      }
    }
 
    function preloadAdjacentLightboxImages() {
      if (currentIndex < allImages.length - 1) {
        const nextItem = allImages[currentIndex + 1];
        if (!nextItem.mimeType?.includes('video')) {
          const nextImg = new Image();
          nextImg.src = getThumbnailUrl(nextItem.id, 1200);
        }
      }
      if (currentIndex > 0) {
        const prevItem = allImages[currentIndex - 1];
        if (!prevItem.mimeType?.includes('video')) {
          const prevImg = new Image();
          prevImg.src = getThumbnailUrl(prevItem.id, 1200);
        }
      }
    }
 
    function updateMobileDots() {
      const dotsContainer = document.getElementById('navDots');
      if (window.innerWidth <= 600 && allImages.length > 1) {
        dotsContainer.innerHTML = '';
        for (let i = 0; i < allImages.length; i++) {
          const dot = document.createElement('span');
          dot.className = 'dot' + (i === currentIndex ? ' active' : '');
          dot.onclick = () => {
            currentIndex = i;
            updateLightboxMedia();
            preloadAdjacentLightboxImages();
          };
          dotsContainer.appendChild(dot);
        }
      }
    }
 
    window.onload = () => {
      updateLoadingPercentage(0);
      setTimeout(() => {
        document.getElementById('card').style.cursor = 'pointer';
        if (!dataLoaded) {
          updateLoadingPercentage(25);
        }
      }, 300);
    };
 
    function runOpeningSequence() {
      // Hide loading text when animation starts
      const loadingMemories = document.getElementById('loadingMemories');
      if (loadingMemories) {
        loadingMemories.style.opacity = '0';
      }
      const card = document.getElementById('card');
      const stage = document.getElementById('invitation-stage');
      const site = document.getElementById('main-site');
 
      card.classList.add('state-flip');
      setTimeout(() => {
        card.classList.add('state-open');
        setTimeout(() => {
          card.classList.remove('state-flip');
          card.classList.add('state-zoom');
          setTimeout(() => {
            stage.style.opacity = '0';
            setTimeout(() => { 
              stage.style.display = 'none'; 
              site.classList.add('is-visible');
              document.body.style.overflow = "auto";
              if (dataLoaded && allImages.length > 0) {
                renderGallery();
              } else {
                document.getElementById("gallery").innerHTML = 'Loading memories...';
                loadGallery();
              }
            }, 800);
          }, 800);
        }, 1200);
      }, 800);
    }
 
    function loadGallery() {
      if (!dataLoaded) {
        fetch(SCRIPT_URL)
          .then(res => res.json())
          .then(data => {
            if (data.success) {
              allImages = data.images || [];
              dataLoaded = true;
              renderGallery();
            } else {
              document.getElementById("gallery").innerHTML = 'No images found yet.';
            }
          })
          .catch(err => {
            document.getElementById("gallery").innerHTML = 'Error loading gallery. Please refresh.';
          });
      } else {
        renderGallery();
      }
    }
 
    function renderGallery() {
      const gallery = document.getElementById("gallery");
      if (allImages.length === 0) {
        gallery.innerHTML = 'No images in the collection yet. Be the first to upload!';
        return;
      }
      gallery.innerHTML = '';
      allImages.forEach((img, index) => {
        const wrap = document.createElement('div');
        wrap.className = 'gallery-item';
        // Check if it's a video
        const isVideo = img.mimeType?.includes('video') || 
                       img.name?.toLowerCase().match(/\.(mp4|mov|webm|avi|wmv|flv|mkv)$/);
        if (isVideo) {
          // FIXED: For videos, show a thumbnail with play button
          const videoContainer = document.createElement('div');
          videoContainer.style.position = 'relative';
          videoContainer.style.width = '100%';
          videoContainer.style.height = '350px';
          videoContainer.style.backgroundColor = '#f5f5f5';
          videoContainer.style.display = 'flex';
          videoContainer.style.alignItems = 'center';
          videoContainer.style.justifyContent = 'center';
          // Video play icon
          const playIcon = document.createElement('div');
          playIcon.innerHTML = '▶';
          playIcon.style.fontSize = '60px';
          playIcon.style.color = 'var(--sage)';
          playIcon.style.opacity = '0.7';
          playIcon.style.textShadow = '0 2px 10px rgba(0,0,0,0.2)';
          videoContainer.appendChild(playIcon);
          // Video indicator
          const videoIndicator = document.createElement('div');
          videoIndicator.className = 'video-indicator';
          videoIndicator.textContent = 'VIDEO';
          videoContainer.appendChild(videoIndicator);
          wrap.appendChild(videoContainer);
        } else {
          // FIXED: For images, use direct thumbnail URL with cache busting
          const el = document.createElement('img');
          // Add cache busting parameter
          el.src = getThumbnailUrl(img.id, 400) + '&t=' + Date.now();
          el.loading = "lazy";
          el.alt = img.name || 'Gallery image';
          el.style.backgroundColor = '#f5f5f5';
          // Fallback if image fails to load
          el.onerror = function() {
            // Try without cache busting
            this.src = getThumbnailUrl(img.id, 400);
            this.onerror = function() {
              // Show placeholder if still fails
              this.src = 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300"><rect width="400" height="300" fill="%23f5f5f5"/><text x="200" y="150" text-anchor="middle" fill="%238da089" font-family="Prata" font-size="20">Memory</text></svg>';
            };
          };
          wrap.appendChild(el);
        }
        wrap.onclick = () => openLightbox(index);
        gallery.appendChild(wrap);
      });
    }
 
    function openLightbox(index) {
      currentIndex = index;
      const lightbox = document.getElementById('lightbox');
      lightbox.style.display = 'flex';
      const downloadAllBtn = document.getElementById('downloadAllBtn');
      downloadAllBtn.style.display = allImages.length > 1 ? 'block' : 'none';
      updateLightboxMedia();
      preloadAdjacentLightboxImages();
      updateMobileDots();
      lightbox.addEventListener('touchstart', handleTouchStart, { passive: true });
      lightbox.addEventListener('touchend', handleTouchEnd, { passive: true });
    }
 
    function handleTouchStart(event) {
      touchStartX = event.changedTouches[0].screenX;
    }
 
    function handleTouchEnd(event) {
      touchEndX = event.changedTouches[0].screenX;
      handleSwipe();
    }
 
    function handleSwipe() {
      const swipeThreshold = 50;
      const diff = touchStartX - touchEndX;
      if (Math.abs(diff) > swipeThreshold) {
        if (diff > 0) {
          nextImage();
        } else {
          prevImage();
        }
      }
    }
 
    function updateLightboxMedia() {
      const item = allImages[currentIndex];
      const container = document.getElementById('media-container');
      const lbCounter = document.getElementById('lb-counter');
      container.innerHTML = '';
      const isVideo = item.mimeType?.includes('video') || 
                     item.name?.toLowerCase().match(/\.(mp4|mov|webm|avi|wmv|flv|mkv)$/);
 
      if (isVideo) {
        container.innerHTML = '<div style="text-align:center;padding:40px;color:var(--sage);">Loading video...</div>';
        const video = document.createElement('video');
        video.id = "lightbox-content";
        video.src = getViewUrl(item.id);
        video.controls = true;
        video.preload = "auto";
        video.playsInline = true;
        video.style.maxWidth = '90%';
        video.style.maxHeight = '80%';
        video.oncanplay = () => {
          container.innerHTML = '';
          container.appendChild(video);
          video.play().catch(e => console.log("Autoplay blocked"));
        };
        video.onerror = () => {
          container.innerHTML = '<div style="text-align:center;padding:40px;color:var(--sage);">Video failed to load. Try downloading instead.</div>';
        };
      } else {
        const img = document.createElement('img');
        img.id = "lightbox-content";
        // Start with thumbnail, then load full
        img.src = getThumbnailUrl(item.id, 1200) + '&t=' + Date.now();
        img.style.opacity = '0.9';
        img.style.transition = 'opacity 0.3s';
        img.style.objectFit = 'contain';
        img.onload = () => {
          container.innerHTML = '';
          container.appendChild(img);
          // Try to load full resolution
          const hqImg = new Image();
          hqImg.src = getViewUrl(item.id);
          hqImg.onload = () => {
            if (img.parentNode) {
              img.style.opacity = '0';
              setTimeout(() => {
                img.src = hqImg.src;
                img.style.opacity = '1';
              }, 150);
            }
          };
          hqImg.onerror = () => {
            console.log("Full resolution failed, using thumbnail");
          };
        };
        img.onerror = () => {
          img.src = getThumbnailUrl(item.id, 800);
        };
        container.appendChild(img);
      }
      lbCounter.textContent = (currentIndex + 1) + " / " + allImages.length;
      updateMobileDots();
    }
 
    function downloadCurrentMedia() {
      const item = allImages[currentIndex];
      const link = document.createElement('a');
      link.href = getDownloadUrl(item.id);
      link.download = item.name;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }
 
    async function downloadAllMedia() {
      if (allImages.length === 0) {
        alert('No images to download!');
        return;
      }
      const downloadBtn = document.getElementById('downloadAllCollectionBtn');
      const originalText = downloadBtn.textContent;
      downloadBtn.textContent = 'Preparing download...';
      downloadBtn.disabled = true;
      if (allImages.length === 1) {
        downloadCurrentMedia();
        downloadBtn.textContent = originalText;
        downloadBtn.disabled = false;
        return;
      }
      alert(`Starting download of ${allImages.length} files. They will download one by one.`);
      for (let i = 0; i < allImages.length; i++) {
        const item = allImages[i];
        const link = document.createElement('a');
        link.href = getDownloadUrl(item.id);
        link.download = item.name;
        document.body.appendChild(link);
        await new Promise(resolve => setTimeout(resolve, 500));
        link.click();
        document.body.removeChild(link);
      }
      downloadBtn.textContent = originalText;
      downloadBtn.disabled = false;
    }
 
    function closeLightbox() { 
      document.getElementById('lightbox').style.display = 'none'; 
      const lightbox = document.getElementById('lightbox');
      lightbox.removeEventListener('touchstart', handleTouchStart);
      lightbox.removeEventListener('touchend', handleTouchEnd);
    }
 
    function nextImage() { 
      if (currentIndex < allImages.length - 1) { 
        currentIndex++; 
        updateLightboxMedia();
        preloadAdjacentLightboxImages();
      } 
    }
 
    function prevImage() { 
      if (currentIndex > 0) { 
        currentIndex--; 
        updateLightboxMedia();
        preloadAdjacentLightboxImages();
      } 
    }
 
    document.addEventListener('keydown', e => {
      if (document.getElementById('lightbox').style.display === 'flex') {
        if (e.key === "ArrowRight") nextImage();
        if (e.key === "ArrowLeft") prevImage();
        if (e.key === "Escape") closeLightbox();
      }
    });
 
    document.addEventListener('touchstart', function() {
      const arrows = document.querySelectorAll('.arrow');
      arrows.forEach(arrow => {
        arrow.style.display = 'flex';
        setTimeout(() => {
          arrow.style.display = 'none';
        }, 3000);
      });
    });
 
    document.getElementById('fileInput').onchange = function() {
      document.getElementById('file-count').innerHTML = this.files.length + " files selected";
    };
 
    // FIXED: Upload with percentage bar
    document.getElementById("uploadBtn").onclick = async function() {
      const fileInput = document.getElementById("fileInput");
      const status = document.getElementById("status");
      const files = fileInput.files;
      if (!files.length) {
        status.textContent = "Please select files first!";
        status.style.color = "red";
        setTimeout(() => {
          status.textContent = "";
          status.style.color = "";
        }, 3000);
        return;
      }
      this.disabled = true;
      fileInput.disabled = true;
      // Show upload progress modal
      showUploadProgress();
      updateUploadPercentage(0);
      updateUploadStatus(`Uploading 0 of ${files.length} files...`);
      let completed = 0;
      let uploadSuccess = true;
      // Upload files sequentially with progress
      for (let i = 0; i < files.length; i++) {
        const file = files[i];
        try {
          // Read file as base64
          const base64 = await new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = () => {
              const result = reader.result.split(",")[1];
              resolve(result);
            };
            reader.onerror = reject;
            reader.readAsDataURL(file);
          });
          // Update progress
          updateUploadPercentage((i / files.length) * 100);
          updateUploadStatus(`Uploading ${i + 1} of ${files.length}: ${file.name}`);
          // Upload to server
          const response = await fetch(SCRIPT_URL, {
            method: "POST", 
            mode: 'cors',
            headers: { "Content-Type": "text/plain" },
            body: JSON.stringify({ 
              file: base64, 
              fileName: file.name, 
              mimeType: file.type 
            })
          });
          const result = await response.json();
          if (!result.success) {
            throw new Error(result.error || 'Upload failed');
          }
          completed++;
        } catch (error) {
          console.error('Upload error:', error);
          uploadSuccess = false;
          // Continue with other files even if one fails
        }
      }
      // Final update
      updateUploadPercentage(100);
      if (uploadSuccess) {
        updateUploadStatus('Upload complete! Refreshing gallery...');
        // Hide progress after delay
        setTimeout(() => {
          hideUploadProgress();
          // Reset UI
          this.disabled = false;
          fileInput.disabled = false;
          fileInput.value = "";
          document.getElementById('file-count').innerHTML = "";
          status.textContent = "Uploaded! ❤️";
          status.style.color = "var(--sage)";
          // Refresh gallery WITHOUT page reload
          setTimeout(() => {
            // Force reload data from server
            dataLoaded = false;
            loadGallery();
          }, 500);
          // Clear success message after 3 seconds
          setTimeout(() => {
            status.textContent = "";
          }, 3000);
        }, 1500);
      } else {
        updateUploadStatus('Some files failed to upload. Refreshing gallery...');
        setTimeout(() => {
          hideUploadProgress();
          this.disabled = false;
          fileInput.disabled = false;
          status.textContent = "Some uploads may have failed. Gallery refreshed.";
          status.style.color = "orange";
          // Still refresh gallery
          dataLoaded = false;
          loadGallery();
          setTimeout(() => {
            status.textContent = "";
          }, 3000);
        }, 1500);
      }
    };
</script>
</body>
</html>
