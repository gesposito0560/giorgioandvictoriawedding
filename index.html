<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Victoria & Giorgio</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Prata&display=swap" rel="stylesheet">

<style>
:root {
  --sage: #8da089;
  --charcoal: #2c2c2c;
  --cream: #fcfbf9;
}

body {
  margin:0;
  font-family:'Prata', serif;
  background: var(--cream);
  color: var(--charcoal);
  overflow:hidden;
}

/* --- INTRO --- */
#intro {
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  background:var(--cream);
  z-index:9999;
  transition:opacity 1s ease;
}

.card {
  text-align:center;
  cursor:pointer;
  animation: fadeUp 1.5s ease;
}

.names {
  font-size:34px;
  letter-spacing:3px;
}

.date {
  margin-top:20px;
  letter-spacing:4px;
  font-size:14px;
  opacity:0.7;
}

@keyframes fadeUp {
  from {opacity:0; transform:translateY(20px);}
  to {opacity:1; transform:translateY(0);}
}

/* --- MAIN --- */
#app {
  display:none;
  opacity:0;
  transition:opacity 1s ease;
  max-width:1200px;
  margin:auto;
  padding:60px 20px;
}

/* --- HEADER --- */
h2 {
  text-align:center;
  letter-spacing:5px;
  color:var(--sage);
  margin-bottom:50px;
}

/* --- UPLOAD --- */
.upload {
  text-align:center;
  margin-bottom:70px;
}

.upload label {
  border:1px solid var(--charcoal);
  padding:14px 40px;
  cursor:pointer;
  transition:0.3s;
}

.upload label:hover {
  background:var(--charcoal);
  color:white;
}

#uploadBtn {
  margin-top:20px;
  padding:12px 40px;
  border:none;
  border-radius:40px;
  background:var(--sage);
  color:white;
  cursor:pointer;
}

/* --- GALLERY --- */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  gap:25px;
}

.item {
  background:white;
  padding:10px;
  box-shadow:0 8px 25px rgba(0,0,0,0.05);
  cursor:pointer;
  transform:translateY(10px);
  opacity:0;
  transition:all 0.6s ease;
}

.item.visible {
  transform:translateY(0);
  opacity:1;
}

.item img {
  width:100%;
  height:320px;
  object-fit:cover;
  transition:transform 0.4s ease, opacity 0.5s ease;
  opacity:0;
}

.item img.loaded {
  opacity:1;
}

.item:hover img {
  transform:scale(1.04);
}

/* --- LIGHTBOX --- */
#lightbox {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.92);
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  animation:fadeIn 0.3s ease;
}

#lightbox img {
  max-width:90%;
  max-height:85%;
  border-radius:12px;
  box-shadow:0 10px 40px rgba(0,0,0,0.5);
}

@keyframes fadeIn {
  from {opacity:0;}
  to {opacity:1;}
}

/* arrows */
.arrow {
  position:absolute;
  top:50%;
  font-size:40px;
  color:white;
  cursor:pointer;
  user-select:none;
}

.left { left:20px; }
.right { right:20px; }

/* download */
#download {
  position:absolute;
  top:20px;
  background:var(--sage);
  color:white;
  padding:10px 20px;
  border-radius:30px;
  cursor:pointer;
}

/* subtle scroll hint */
.scroll-hint {
  text-align:center;
  margin-top:20px;
  opacity:0.6;
  font-size:12px;
  letter-spacing:2px;
}
</style>
</head>

<body>

<div id="intro">
  <div class="card" onclick="enterSite()">
    <div class="names">Victoria & Giorgio</div>
    <div class="date">03 · 28 · 2026</div>
    <div class="scroll-hint">Tap to enter</div>
  </div>
</div>

<div id="app">
  <h2>Share Your Memories</h2>

  <div class="upload">
    <label for="file">Select Photos</label>
    <input id="file" type="file" multiple hidden>
    <br>
    <button id="uploadBtn">Upload</button>
    <div id="status"></div>
  </div>

  <h2>The Collection</h2>
  <div id="gallery" class="grid"></div>
</div>

<div id="lightbox">
  <div id="download" onclick="download()">Download</div>
  <img id="lightImg">
  <div class="arrow left" onclick="prev()">❮</div>
  <div class="arrow right" onclick="next()">❯</div>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyt-UGrZwkoTJwlbUOYGnDAEUbycu16TYH_usG_a1npV_9xRF6AZJTPGf5kVLwj2jIfNg/exec";

let images = [];
let index = 0;

/* ENTER */
function enterSite(){
  document.getElementById('intro').style.opacity=0;
  setTimeout(()=>{
    document.getElementById('intro').style.display='none';
    const app=document.getElementById('app');
    app.style.display='block';
    setTimeout(()=>app.style.opacity=1,100);
    loadGallery();
    document.body.style.overflow="auto";
  },800);
}

/* LOAD */
async function loadGallery(){
  const res = await fetch(SCRIPT_URL);
  const data = await res.json();
  images = data.images.reverse();
  render();
}

/* RENDER */
function render(){
  const g=document.getElementById('gallery');
  g.innerHTML='';

  images.forEach((img,i)=>{
    const div=document.createElement('div');
    div.className='item';

    const el=document.createElement('img');

    // progressive loading
    el.src = `https://drive.google.com/thumbnail?id=${img.id}&sz=w400`;

    const high = new Image();
    high.src = `https://drive.google.com/thumbnail?id=${img.id}&sz=w1200`;
    high.onload = ()=> el.src = high.src;

    el.onload=()=> el.classList.add('loaded');

    div.appendChild(el);

    div.onclick=()=>openLightbox(i);

    g.appendChild(div);

    setTimeout(()=>div.classList.add('visible'), i*40);
  });
}

/* LIGHTBOX */
function openLightbox(i){
  index=i;
  document.getElementById('lightbox').style.display='flex';
  update();
}

function update(){
  document.getElementById('lightImg').src =
    `https://drive.google.com/thumbnail?id=${images[index].id}&sz=w1200`;
}

function next(){
  if(index<images.length-1){index++; update();}
}

function prev(){
  if(index>0){index--; update();}
}

function download(){
  const a=document.createElement('a');
  a.href=`https://drive.google.com/uc?export=download&id=${images[index].id}`;
  a.click();
}

/* CLOSE */
document.getElementById('lightbox').onclick=e=>{
  if(e.target.id==="lightbox"){
    e.currentTarget.style.display='none';
  }
};

/* UPLOAD (simplified luxury messaging) */
document.getElementById('uploadBtn').onclick=async()=>{
  const files=document.getElementById('file').files;
  if(!files.length) return;

  const status=document.getElementById('status');
  status.innerText="Saving your memories ❤️";

  for(let file of files){
    const reader=new FileReader();
    const base64=await new Promise(r=>{
      reader.onload=()=>r(reader.result.split(',')[1]);
      reader.readAsDataURL(file);
    });

    await fetch(SCRIPT_URL,{
      method:"POST",
      body:JSON.stringify({file:base64, fileName:file.name})
    });
  }

  status.innerText="Uploaded ✨";
  loadGallery();
};
</script>

</body>
</html>
